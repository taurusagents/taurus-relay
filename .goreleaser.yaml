version: 2

project_name: taurus-relay

builds:
  - id: taurus-relay
    main: .
    binary: taurus-relay
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/taurusagents/taurus-relay/internal/health.Version={{ .Version }}

archives:
  - id: relay-archives
    ids:
      - taurus-relay
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
